name: Backend Production CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'server/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check JavaScript Syntax
        run: node --check server/src/index.js

      - name: Run Backend Tests
        env:
          DATABASE_URL: mongodb://localhost:27017/review-lens-test
          JWT_SECRET: production-grade-ci-test-secret-98765
        run: npm run test:server